name: RSS Fetch (Weekly)

on:
  schedule:
    # 每周五 北京时间 02:00（UTC 周四 18:00）抓取，Routine 在同天北京时间 06:00（UTC 周四 22:00）跑
    - cron: '0 18 * * 4'
  workflow_dispatch:    # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch RSS (no LLM)
        run: |
          uv run python -m NewsPilot --no-llm
        env:
          # 关闭 LLM，只抓取 RSS + 全文内容
          NP_SKIP_LLM: "1"

      - name: Export RSS items for Claude analysis
        run: |
          uv run python -m NewsPilot llm.agent_enrich fetch \
            --date "$(date +%Y-%m-%d)" \
            > output/rss_items_for_enrich.json
          echo "📋 导出完成，条目数："
          python3 -c "import json; d=json.load(open('output/rss_items_for_enrich.json')); print(d.get('total_count', 0))"

      - name: Upload RSS data artifact
        uses: actions/upload-artifact@v4
        with:
          name: rss-data-${{ github.run_id }}
          path: output/
          # 同天完成，保留 1 天即可
          retention-days: 1

      - name: Summary
        run: |
          echo "## RSS 抓取完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 运行时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact 名称：\`rss-data-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 保留天数：10 天" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下一步：在本地运行 Claude Code Routine 完成 AI 富化分析。" >> $GITHUB_STEP_SUMMARY
