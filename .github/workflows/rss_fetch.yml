name: RSS Fetch (Weekly)

on:
  schedule:
    # 每周五 北京时间 02:00（UTC 周四 18:00）抓取过去 7 天内的文章
    - cron: '0 18 * * 4'
  workflow_dispatch:    # 允许手动触发

permissions:
  contents: write   # 允许 commit + push data/rss/

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch RSS (no LLM)
        run: |
          uv run python -m NewsPilot --no-llm
        env:
          # 关闭 LLM，只抓取 RSS + 全文内容
          NP_SKIP_LLM: "1"

      - name: Export RSS items (with fulltext, cached) for Claude analysis
        run: |
          mkdir -p data/rss output
          uv run python - <<'EOF'
          import json, os, sys
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from NewsPilot.core import load_config
          from NewsPilot.llm.agent_enrich import get_rss_items_for_agent
          from NewsPilot.llm.fulltext import FullTextConfig, fetch_article_text

          date = datetime.now(ZoneInfo("Asia/Shanghai")).strftime("%Y-%m-%d")
          out_path = "data/rss/rss_items_for_enrich.json"

          # 1. 读取 RSS 条目
          result = get_rss_items_for_agent(date=date)
          items = result.get("items", [])
          if not items:
              print(f"WARNING: 无 RSS 数据: {result.get('error', '')}", file=sys.stderr)

          # 2. 读取 fulltext 配置
          config = load_config()
          ft_raw = (config.get("LLM") or {}).get("FULLTEXT") or {}
          ft_cfg = FullTextConfig(
              enabled=True,
              timeout=int(ft_raw.get("TIMEOUT", 15) or 15),
              max_bytes=int(ft_raw.get("MAX_BYTES", 12000000) or 12000000),
              max_chars=int(ft_raw.get("MAX_CHARS", 60000) or 60000),
              min_paragraph_chars=int(ft_raw.get("MIN_PARAGRAPH_CHARS", 60) or 60),
              request_interval_ms=int(ft_raw.get("REQUEST_INTERVAL_MS", 200) or 200),
              use_proxy=False,
              proxy_url="",
          )
          max_items = int(ft_raw.get("MAX_ITEMS", 200) or 200)

          # 3. 加载上一次抓取结果，建立 URL -> content 缓存
          cache = {}
          if os.path.exists(out_path):
              try:
                  with open(out_path, "r", encoding="utf-8") as f:
                      prev = json.load(f)
                  for it in prev.get("items", []):
                      url = (it.get("url") or "").strip()
                      content = it.get("content") or ""
                      if url and content and len(content) >= ft_cfg.min_paragraph_chars:
                          cache[url] = content
                  print(f"  从上次抓取复用 {len(cache)} 条 fulltext 缓存")
              except Exception as e:
                  print(f"  WARNING: 读旧数据失败 ({e})，跳过缓存", file=sys.stderr)

          # 4. 逐条处理：缓存命中复用，否则现抓
          cached_reused = 0
          fetched_ok = 0
          fetched_failed = 0
          for idx, item in enumerate(items[:max_items]):
              url = (item.get("url") or "").strip()
              if not url:
                  continue
              if url in cache:
                  item["content"] = cache[url]
                  cached_reused += 1
                  continue
              content = fetch_article_text(url, ft_cfg)
              if content and len(content) >= ft_cfg.min_paragraph_chars:
                  item["content"] = content
                  fetched_ok += 1
              else:
                  fetched_failed += 1
              if (idx + 1) % 10 == 0:
                  print(f"  进度 {idx+1}/{min(len(items), max_items)}，缓存 {cached_reused}，新抓 {fetched_ok}，失败 {fetched_failed}")

          result["items"] = items
          result["total_count"] = len(items)
          result["fulltext_ok"] = cached_reused + fetched_ok
          result["fulltext_failed"] = fetched_failed
          result["fulltext_cached_reused"] = cached_reused
          result["fulltext_newly_fetched"] = fetched_ok

          # 5. 写文件
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"导出完成: {len(items)} 条，全文有效 {cached_reused + fetched_ok}（缓存 {cached_reused} + 新抓 {fetched_ok}），失败/空 {fetched_failed}")
          EOF

      - name: Commit RSS data to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rss/rss_items_for_enrich.json
          if git diff --staged --quiet; then
            echo "No changes to commit (data unchanged)"
          else
            DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
            COUNT=$(python3 -c "import json; d=json.load(open('data/rss/rss_items_for_enrich.json')); print(d.get('total_count', len(d.get('items', []))))")
            git commit -m "data(rss): refresh ${DATE} (${COUNT} items)"
            git pull --rebase origin main
            git push origin main
            echo "已 commit + push 到 main"
          fi

      - name: Summary
        run: |
          echo "## RSS 抓取完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 运行时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- 数据文件：\`data/rss/rss_items_for_enrich.json\`（已 commit 到 main）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下一步：在 Routine 中 \`git pull\` 后读取该文件完成 AI 富化分析。" >> $GITHUB_STEP_SUMMARY
